# Flatpak manifest for Owera Things4Linux.
#
# Build (from the repo root):
#   flatpak install flathub org.gnome.Platform//47 org.gnome.Sdk//47
#   flatpak-builder --user --install --force-clean build build-aux/com.owera.Things4Linux.yaml
#   flatpak run com.owera.Things4Linux
#
# The pinned Python wheels in python3-httpx.json were generated from PyPI; refresh
# them with flatpak-pip-generator (or the helper used to create this repo) when
# bumping httpx.
id: com.owera.Things4Linux
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: things4linux

finish-args:
  # Things Cloud sync needs the network.
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Store the account credentials in the system keyring.
  - --talk-name=org.freedesktop.secrets

modules:
  # httpx and its (pure-python) dependency closure.
  - python3-httpx.json

  - name: things4linux
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --no-build-isolation --prefix=${FLATPAK_DEST} .
      - install -Dm644 data/com.owera.Things4Linux.desktop
          ${FLATPAK_DEST}/share/applications/com.owera.Things4Linux.desktop
      - install -Dm644 data/com.owera.Things4Linux.metainfo.xml
          ${FLATPAK_DEST}/share/metainfo/com.owera.Things4Linux.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/com.owera.Things4Linux.svg
          ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/com.owera.Things4Linux.svg
    sources:
      - type: dir
        path: '..'
